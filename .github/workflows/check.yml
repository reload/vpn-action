---
name: Code quality
on:
  - pull_request
  - push

permissions:
  contents: read
  pull-requests: write

jobs:
  eslint:
    name: eslint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
      - name: npm install
        run: |
          npm ci
      - name: eslint
        run: |
          npm run lint
  prettier:
    name: prettier
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
      - name: npm clean-install
        run: |
          npm ci
      - name: prettier
        run: |
          npm run format:check
